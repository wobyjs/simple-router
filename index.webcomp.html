<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Router Demo - Web Components</title>
    <style>
        /* Minimal fallback styles - removed, using Tailwind CSS */
    </style>
</head>

<body>
    <h1 class="text-3xl font-bold mb-6 text-center text-blue-500">Simple Router Demo</h1>

    <!-- Custom Elements Usage -->
    <h2 class="text-3xl font-bold mb-6 text-center text-gray-800">Custom Elements / Web Component Demo</h2>
    <woby-router id="custom-router" class="block mx-auto max-w-max">
        <nav class="bg-white shadow-md rounded-lg p-4 mb-6">
            <woby-link to="/" id="home-link"><active-button>Home</active-button></woby-link>
            <woby-link to="/about" id="about-link"><active-button>About</active-button></woby-link>
            <woby-link to="/contact" id="contact-link"><active-button>Contact</active-button></woby-link>
            <woby-link to="/products" id="products-link"><active-button>Products</active-button></woby-link>
            <woby-link to="/user/john" id="user-link"><active-button>User Profile</active-button></woby-link>
        </nav>

        <div class="content">
            <woby-route></woby-route>
        </div>
    </woby-router>

    <script type="module" src="./demo.tsx"></script>

    <!-- Custom elements test script - configure routes for woby-router -->
    <script type="module">
        import { Home, About, Contact, Products, UserProfile, NotFound } from './demo.tsx';
        
        // Wait for custom elements to be defined
        Promise.all([
            customElements.whenDefined('woby-link'),
            customElements.whenDefined('woby-router'),
            customElements.whenDefined('woby-route'),
            customElements.whenDefined('active-button')
        ]).then(() => {
            console.log('Custom elements are ready!');
            
            // Set routes on the custom element woby-router
            const customRouter = document.getElementById('custom-router');
            if (customRouter && customRouter.props && customRouter.props.routes) {
                customRouter.props.routes([
                    { path: '/', to: Home },
                    { path: '/about', to: About },
                    { path: '/contact', to: Contact },
                    { path: '/products', to: Products },
                    { path: '/user/:username', to: UserProfile },
                    { path: '/404', to: NotFound }
                ]);
                console.log('Routes configured on woby-router');
            } else {
                console.warn('woby-router not found or missing props.routes');
            }
        }).catch(err => {
            console.error('Failed to load custom elements:', err);
        });
    </script>
</body>

</html>
