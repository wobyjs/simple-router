<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Router Demo</title>
    <style>
        /* Minimal fallback styles - removed, using Tailwind CSS */
    </style>
</head>

<body>
    <h1>Simple Router Demo</h1>

    <!-- Custom Elements Usage -->
    <h2>Custom Elements Demo</h2>
    <woby-router id="custom-router">
        <nav class="bg-white shadow-md rounded-lg p-4 mb-6">
            <woby-link to="/" id="home-link"><active-button >Home</active-button></woby-link>
            <woby-link to="/about" id="about-link"><active-button >About</active-button></woby-link>
            <woby-link to="/contact" id="contact-link"><active-button >Contact</active-button></woby-link>
            <woby-link to="/products" id="products-link"><active-button >Products</active-button></woby-link>
            <woby-link to="/user/john" id="user-link"><active-button >User Profile</active-button></woby-link>
        </nav>

        <div class="content">
            <woby-route></woby-route>
        </div>
    </woby-router>

    <div id="app">Loading...</div>

    <script type="module" src="./demo.tsx"></script>

    <!-- Custom elements test script -->
 
</body>

</html>
